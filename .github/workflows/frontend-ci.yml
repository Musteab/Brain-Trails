name: Frontend CI

on:
  push:
    branches: [main, 'feature/**']
    paths:
      - 'brain-trails/**'
      - '!brain-trails/backend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'brain-trails/**'
      - '!brain-trails/backend/**'
      - '.github/workflows/frontend-ci.yml'

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: brain-trails

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build production bundle (includes type checking)
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: nextjs-build
          path: brain-trails/.next
          retention-days: 7
